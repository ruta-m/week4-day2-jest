name: CI/CD Pipeline2
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Step 1: Test + Coverage Gate ──────────────────────────────
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      # FIX: Install ts-node dynamically if it's not in your package.json 
      # to handle jest.config.ts parsing.
      - name: Install ts-node
        run: npm install ts-node --no-save

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --forceExit --coverageReporters="lcov" --coverageReporters="text"

      - name: Check coverage is ≥ 80%
        run: |
          # Robust check for lcov.info existence before grep
          if [ ! -f coverage/lcov.info ]; then echo "lcov.info not found!"; exit 1; fi
          FOUND=$(grep "^LF:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          HIT=$(grep "^LH:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          if [ "$FOUND" -eq 0 ]; then PCT=0; else PCT=$(( HIT * 100 / FOUND )); fi
          echo "Coverage: $PCT%"
          [ "$PCT" -ge 80 ] || { echo "Coverage $PCT% < 80%. Failing."; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── Step 2: SonarQube Analysis ────────────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://didactic-xylophone-97wq5gr46v6w36xr-9000.app.github.dev
        with:
          args: >
            -Dsonar.projectKey=asfasdfasfa
            -Dsonar.projectName=asfasdfasfa
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.inclusions=src/**/*.ts,src/**/*.tsx
            -Dsonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/setupTests.ts,src/main.tsx,node_modules/**,dist/**,coverage/**
            -Dsonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.tsconfigPath=tsconfig.json

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://didactic-xylophone-97wq5gr46v6w36xr-9000.app.github.dev

  # ── Step 3: Deploy (only on push to main/master) ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: sonar
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy
        run: echo "Deploying..."
